<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A Game of Life and Ghosts</title>
    <script
      defer
      data-domain="stacked-game-of-life.koenvangilst.nl"
      src="https://plausible.koenvangilst.nl/js/script.js"
    ></script>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div id="canvas-container"></div>

    <div class="settings-menu" id="settings-menu">
      <button class="settings-toggle" id="settings-toggle" aria-label="Toggle settings">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"
          />
        </svg>
      </button>
      <div class="settings-dropdown" id="settings-dropdown">
        <div class="settings-section">
          <span class="settings-label">Simulation</span>
          <div class="settings-buttons">
            <button class="settings-button" id="btn-randomize">Randomize</button>
          </div>
        </div>
        <div class="settings-section">
          <span class="settings-label">Patterns</span>
          <div class="settings-buttons settings-buttons-patterns">
            <button class="settings-button" id="btn-acorn">Acorn</button>
            <button class="settings-button" id="btn-rpentomino">R-Pentomino</button>
            <button class="settings-button" id="btn-glider">Glider</button>
            <button class="settings-button" id="btn-diehard">Diehard</button>
            <button class="settings-button" id="btn-gosper">Gosper Gun</button>
            <button class="settings-button" id="btn-pulsar">Pulsar</button>
          </div>
        </div>
        <div class="settings-section">
          <span class="settings-label">Camera</span>
          <div class="settings-buttons">
            <button class="settings-button" id="btn-top-view">Top</button>
            <button class="settings-button" id="btn-iso-view">Iso</button>
          </div>
        </div>
        <div class="settings-section">
          <span class="settings-label">Configuration</span>
          <div class="settings-row">
            <span class="settings-row-label">History layers</span>
            <span class="settings-value" id="layers-value">30</span>
          </div>
          <div class="settings-slider-container">
            <input
              type="range"
              min="1"
              max="100"
              value="30"
              class="settings-slider"
              id="slider-layers"
            />
          </div>
        </div>
      </div>
    </div>

    <div id="footer">
      made by <a href="https://koenvangilst.nl">Koen van Gilst</a> &bull; source on
      <a href="https://github.com/vnglst/stacked-game-of-life">github</a>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
